name: テスト失敗Issue起票

on:
  workflow_run:
    workflows: ['*']
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  create-issue-on-failure:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main' &&
      contains(github.event.workflow_run.name, 'test')

    steps:
      - name: 既存のIssueを確認（重複防止）
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const title = `テスト失敗: ${context.payload.workflow_run.name}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure,automated'
            });

            const duplicate = issues.data.find(i => i.title === title);
            return duplicate ? 'duplicate' : 'new';

      - name: Issue起票（重複なしの場合）
        if: steps.check.outputs.result != 'duplicate'
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧪 テスト失敗: ${run.name}`,
              body: `mainブランチでテストが失敗しました。\n\n- **ワークフロー**: ${run.name}\n- **ブランチ**: ${run.head_branch}\n- **コミット**: ${run.head_sha.substring(0,7)}\n- **実行URL**: ${run.html_url}\n\n早急に確認・修正してください。\n\n---\n*このIssueはGitHub Actionsによって自動起票されました*`,
              labels: ['bug', 'test-failure', 'automated']
            });
